%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/wacom,w9007.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Wacom W9000-series penabled I2C touchscreen driver

description:
  The W9000-series are penabled touchscreen controllers by Wacom.
  It is used in some Samsung Galaxy Tab devices from 2013 and 2014.

maintainers:
  - Hendrik Noack <hendrik.noack@protonmail.com>

properties:
  compatible:
    enum:
      - wacom,w9007a_lt03
      - wacom,w9007a_v1
      - wacom,w9010

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  vdd-supply:
    description:
      Optional regulator for the VDD digital voltage.

  pdct-gpios:
    maxItems: 1
    description:
      Optional GPIO specifier for the touchscreen's pdct pin.

  flash-mode-gpios:
    maxItems: 1
    description:
      Optional GPIO specifier for the touchscreen's flash-mode pin.

  pen-inserted-gpios:
    maxItems: 1
    description:
      Optional GPIO specifier for the touchscreen's pen-insert pin.

  touchscreen-inverted-x:
    description: X axis is inverted
    type: boolean

  touchscreen-inverted-y:
    description: Y axis is inverted
    type: boolean

  touchscreen-swapped-x-y:
    description: X and Y axis are swapped
                 Swapping is done after inverting the axis
    type: boolean

  touchscreen-x-mm:
    description: horizontal length in mm of the touchscreen

  touchscreen-y-mm:
    description: vertical length in mm of the touchscreen


required:
  - compatible
  - reg
  - interrupts
  - vdd-supply

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>
    #include <dt-bindings/gpio/gpio.h>
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;
      digitizer@56 {
        compatible = "wacom,wacom,w9007a_v1";
        reg = <0x56>;
        interrupt-parent = <&gpx3>;
        interrupts = <5 IRQ_TYPE_EDGE_RISING>;

        vdd-supply = <&stylus_reg>;

        pdct-gpios = <&gpd1 2 GPIO_ACTIVE_HIGH>;
        flash-mode-gpios = <&gpd1 3 GPIO_ACTIVE_HIGH>;
        pen-inserted-gpios = <&gpx0 0 GPIO_ACTIVE_LOW>;

        touchscreen-x-mm = <262>;
        touchscreen-y-mm = <164>;
      };
    };
